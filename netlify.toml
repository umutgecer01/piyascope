[build]
command = "npm run build"
publish = "dist/client"
ignore = "git log --oneline -1 | grep -q deploy || exit 1"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
package = "@netlify/plugin-nextjs"
optional = true
skip = true
